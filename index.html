<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频制作 · 定制沟通</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: #f7f7f7;
            padding: 20px 10px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 25px;
            max-width: 380px;
            margin: 0 auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 24px;
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }
        .qrcode-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .qrcode {
            width: 220px;
            height: 220px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .contact-info {
            text-align: center;
            margin-bottom: 20px;
        }
        .contact-info p {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .copy-btn {
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .copy-btn:active {
            background: #0056b3;
        }
        .notice {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        .notice h3 {
            color: #d2691e;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>视频制作 · 定制沟通</h1>

        <div class="qrcode-container">
            < img class="qrcode" id="qr-img" src="qrcode.png" alt="客服联络二维码">
        </div>

        <div class="contact-info">
            <p>联络号：<span id="contact">19196307594</span></p >
            <button class="copy-btn" onclick="copyText()">复制联络号</button>
        </div>

        <div class="notice">
            <h3>定制沟通说明</h3>
            <p>1. 沟通仅作为定制需求沟通以及收发文件。</p >
            <p>2. 下单支付一律在淘宝平台付款。</p >
            <p>3. 不接受任何第三方渠道支付。</p >
        </div>
    </div>

    <script>
        function copyText() {
            const text = document.getElementById("contact").innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("已复制！打开企业微信粘贴添加即可");
            }).catch(() => {
                alert("复制失败，请手动记录联络号");
            });
        }
    </script>
</body>
</html>
